<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stats Detalladas 25/26</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0c4a6e, #1e3a8a, #1e1b4b);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            margin-top: 40px;
            margin-bottom: 40px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #fbbf24, #f59e0b, #d97706);
            -webkit-background-clip: text;
            color: transparent;
            padding: 0 20px; /* Evita que el texto toque los bordes en móvil */
        }

        .container {
            width: 90%;
            max-width: 1100px;
            display: grid;
            /* El minmax asegura que en móviles se adapten correctamente */
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            padding-bottom: 50px;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 18px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: white;
            font-size: 1.4rem;
            font-weight: 700;
            overflow: hidden;
            transition: all .25s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .card:hover {
            transform: translateY(-8px) scale(1.03);
            background: rgba(51, 65, 85, 0.9);
            box-shadow: 0 15px 35px rgba(0,0,0,0.45);
        }

        /* --- AQUÍ ESTÁ EL ARREGLO PARA LA IMAGEN --- */
        .card img {
            width: 100%;
            height: auto;           /* Altura automática para que no se estire */
            max-height: 250px;      /* Límite opcional para que no sea infinita */
            display: block;
            object-fit: contain;    /* Muestra la imagen entera sin recortes */
            background-color: rgba(0, 0, 0, 0.1); /* Fondo sutil si la imagen es pequeña */
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .label {
            padding: 18px;
            text-align: center;
        }

        /* Ajuste extra para móviles muy pequeños */
        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }
            .container {
                grid-template-columns: 1fr; /* Una sola columna en teléfonos pequeños */
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Estadísticas detalladas 25/26</h1>
    </header>

    <div class="container">

        <a class="card" href="StatsJ20.html">
            <img src="Jornada20.jpg" alt="Estadísticas Jornada 20">
            <div class="label">Jornada 20</div>
        </a>

        <a class="card" href="StatsJ17.html">
            <div class="label">Jornada 17</div>
        </a>

        <a class="card" href="StatsJ14.html">
            <div class="label">Jornada 14</div>
        </a>

        <a class="card" href="StatsJ8.html">
            <div class="label">Jornada 8</div>
        </a>

    </div>

</body>
</html>
